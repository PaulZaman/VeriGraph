name: CI/CD - Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-staging.yml'
  pull_request:
    branches:
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-staging.yml'

jobs:
  # ================================
  # BACKEND: Test + Build + Deploy
  # ================================
  backend:
    name: Backend Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python with caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run tests inline
      - name: Run tests
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: python -m pytest test_main.py -v --tb=short

      # Build and test Docker image inline
      - name: Build Docker image
        run: docker build -t verigraph-api:staging .

      - name: Test Docker image
        if: github.event_name == 'push'
        run: |
          docker run -d --name test-api -p 8080:8080 -e TEST_MODE=true verigraph-api:staging
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop test-api
          docker rm test-api

      # Deploy to Fly.io (only on push)
      - name: Deploy to Fly.io Staging
        if: github.event_name == 'push'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: github.event_name == 'push'
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Smoke tests after deployment
      - name: Smoke tests
        if: github.event_name == 'push'
        run: |
          echo "⏳ Waiting for deployment..."
          sleep 15
          
          echo "🧪 Running smoke tests..."
          curl -f https://verigraph-api-staging.fly.dev/health || exit 1
          echo "✓ Health check passed"
          
          curl -f https://verigraph-api-staging.fly.dev/ || exit 1
          echo "✓ Root endpoint passed"
          
          echo "✅ All smoke tests passed!"
      
      # Log model readiness for promotion
      - name: Check Model Promotion Readiness
        if: github.event_name == 'push'
        env:
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: "fact-checker-gan"
        run: |
          echo "📊 Checking if models in Staging meet quality gates..."
          pip install mlflow dagshub
          
          # Create a check script inline
          cat > check_staging.py << 'EOF'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient
          import dagshub
          
          DAGSHUB_REPO = os.getenv("DAGSHUB_REPO")
          DAGSHUB_USER = os.getenv("DAGSHUB_USER")
          DAGSHUB_TOKEN = os.getenv("DAGSHUB_TOKEN")
          MODEL_NAME = os.getenv("MODEL_NAME", "fact-checker-gan")
          
          # Setup MLflow with token auth (skip dagshub.init in CI)
          tracking_uri = f"https://dagshub.com/{DAGSHUB_REPO}.mlflow"
          os.environ["MLFLOW_TRACKING_URI"] = tracking_uri
          os.environ["MLFLOW_TRACKING_USERNAME"] = DAGSHUB_USER
          os.environ["MLFLOW_TRACKING_PASSWORD"] = DAGSHUB_TOKEN
          os.environ["DAGSHUB_USER_TOKEN"] = DAGSHUB_TOKEN
          
          # Skip dagshub.init() in CI to avoid OAuth hang
          if not os.getenv("CI"):
              repo_owner, repo_name = DAGSHUB_REPO.split('/')
              try:
                  dagshub.init(repo_name=repo_name, repo_owner=repo_owner, mlflow=True)
              except Exception as e:
                  print(f"⚠️  DagHub init warning: {e}")
          else:
              print("ℹ️  Skipping dagshub.init() in CI (using MLflow directly)")
          
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient()
          
          # Get staging models
          staging_versions = client.get_latest_versions(MODEL_NAME, stages=["Staging"])
          
          if staging_versions:
              version = staging_versions[0]
              run = client.get_run(version.run_id)
              metrics = run.data.metrics
              
              print(f"\n📦 Staging Model: {MODEL_NAME} v{version.version}")
              print(f"   Run ID: {version.run_id}")
              print(f"\n📊 Metrics:")
              
              acc = metrics.get('test_accuracy', metrics.get('accuracy'))
              f1 = metrics.get('test_f1', metrics.get('f1_score', metrics.get('f1')))
              
              if acc:
                  status = "✅" if acc >= 0.75 else "⚠️"
                  print(f"   {status} Accuracy: {acc:.4f} (threshold: 0.75)")
              if f1:
                  status = "✅" if f1 >= 0.70 else "⚠️"
                  print(f"   {status} F1 Score: {f1:.4f} (threshold: 0.70)")
              
              # Check if ready for production
              if acc and f1 and acc >= 0.75 and f1 >= 0.70:
                  print(f"\n✅ Model ready for promotion to Production!")
              else:
                  print(f"\n⚠️  Model does not meet quality gates for Production")
          else:
              print(f"ℹ️  No model found in Staging")
          EOF
          
          python check_staging.py || echo "⚠️  Could not check staging model"

      # Deployment summary
      - name: Create deployment summary
        if: github.event_name == 'push' && success()
        run: |
          echo "### 🚀 Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://verigraph-api-staging.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed & Tested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:** Model promotion to Production happens on merge to main branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://verigraph-api-staging.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed & Tested" >> $GITHUB_STEP_SUMMARY

  # ================================
  # FRONTEND: Build + Test
  # ================================
  frontend:
    name: Frontend Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js with caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install and build inline
      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build
        run: ls -lh dist/

      # Test summary
      - name: Create build summary
        if: success()
        run: |
          echo "### ✅ Frontend Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Build successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts:** Ready for deployment" >> $GITHUB_STEP_SUMMARY

          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "✅ Frontend build successful"
