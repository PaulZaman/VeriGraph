name: Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-staging.yml'
  pull_request:
    branches:
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-staging.yml'

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🧪 Running unit tests..."
          python -m pytest test_main.py -v --tb=short -m "not integration"

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Backend Unit Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API Endpoint Tests" >> $GITHUB_STEP_SUMMARY

  backend-integration-tests:
    name: Backend Integration Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🔗 Running integration tests..."
          python -m pytest test_main.py -v --tb=short -k "test_verify"

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Backend Integration Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Database Integration Tests" >> $GITHUB_STEP_SUMMARY

  backend-coverage:
    name: Backend Test Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite with coverage
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🎯 Running complete test suite with coverage..."
          python -m pytest test_main.py -v --tb=short --cov=. --cov-report=term-missing

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Test Coverage Report Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Full test suite passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code coverage measured" >> $GITHUB_STEP_SUMMARY

  docker-build:
    name: Docker Build Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t verigraph-api:staging .

      - name: Test Docker container
        run: |
          echo "🐳 Testing Docker container..."
          docker run -d --name test-api -p 8080:8080 -e TEST_MODE=true verigraph-api:staging
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          echo "✓ Health check passed"
          curl -f http://localhost:8080/ || exit 1
          echo "✓ Root endpoint passed"
          docker stop test-api
          docker rm test-api

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Docker Build Test Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker image builds successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container health checks passed" >> $GITHUB_STEP_SUMMARY

  frontend:
    name: Frontend Tests & Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build production bundle
        run: npm run build
        env:
          # Ensure build doesn't fail on warnings
          CI: false

      - name: Check build output
        run: |
          echo "✅ Checking build artifacts..."
          if [ -d "dist" ]; then
            echo "✓ dist/ directory created"
            echo "✓ Build output size: $(du -sh dist | cut -f1)"
            ls -lh dist/
          else
            echo "❌ dist/ directory not found"
            exit 1
          fi

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Frontend Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies Installed (npm ci)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Production Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Artifacts Validated" >> $GITHUB_STEP_SUMMARY

  deploy-backend:
    name: Deploy Backend to Staging
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t verigraph-api:staging .

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke tests
        run: |
          echo "⏳ Waiting for deployment..."
          sleep 15
          
          echo "🧪 Running smoke tests..."
          curl -f https://verigraph-api-staging.fly.dev/health || exit 1
          echo "✓ Health check passed"
          
          curl -f https://verigraph-api-staging.fly.dev/ || exit 1
          echo "✓ Root endpoint passed"
          
          echo "✅ All smoke tests passed!"

      - name: Deployment summary
        if: success()
        run: |
          echo "### 🚀 Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://verigraph-api-staging.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed & Tested" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:** Merge to main for Production deployment" >> $GITHUB_STEP_SUMMARY
