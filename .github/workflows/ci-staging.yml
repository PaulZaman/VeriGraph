name: CI/CD - Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-staging.yml'
  pull_request:
    branches:
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-staging.yml'

jobs:
  # ================================
  # BACKEND: Test + Build + Deploy
  # ================================
  backend:
    name: Backend Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python with caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ==== PR ONLY: Comprehensive Testing ====
      - name: Run Unit Tests
        if: github.event_name == 'pull_request'
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🧪 Running unit tests..."
          python -m pytest test_main.py -v --tb=short -m "not integration"

      - name: Run Integration Tests
        if: github.event_name == 'pull_request'
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🔗 Running integration tests..."
          python -m pytest test_main.py -v --tb=short -k "test_verify"

      - name: Run Full Test Suite
        if: github.event_name == 'pull_request'
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🎯 Running complete test suite..."
          python -m pytest test_main.py -v --tb=short --cov=. --cov-report=term-missing

      # Build Docker image (both PR and push)
      - name: Build Docker image
        run: docker build -t verigraph-api:staging .

      # ==== PR ONLY: Docker Tests ====
      - name: Test Docker image
        if: github.event_name == 'pull_request'
        run: |
          echo "🐳 Testing Docker container..."
          docker run -d --name test-api -p 8080:8080 -e TEST_MODE=true verigraph-api:staging
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          echo "✓ Health check passed"
          curl -f http://localhost:8080/ || exit 1
          echo "✓ Root endpoint passed"
          docker stop test-api
          docker rm test-api

      # ==== PR ONLY: Model Quality Gate Check ====
      - name: Check Model Quality Gates
        if: github.event_name == 'pull_request'
        env:
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "📊 Checking model quality gates..."
          pip install mlflow dagshub
          
          cat > check_quality_gates.py << 'EOF'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient
          
          DAGSHUB_REPO = os.getenv("DAGSHUB_REPO")
          DAGSHUB_USER = os.getenv("DAGSHUB_USER")
          DAGSHUB_TOKEN = os.getenv("DAGSHUB_TOKEN")
          
          # Setup MLflow with token auth
          tracking_uri = f"https://dagshub.com/{DAGSHUB_REPO}.mlflow"
          os.environ["MLFLOW_TRACKING_URI"] = tracking_uri
          os.environ["MLFLOW_TRACKING_USERNAME"] = DAGSHUB_USER
          os.environ["MLFLOW_TRACKING_PASSWORD"] = DAGSHUB_TOKEN
          os.environ["DAGSHUB_USER_TOKEN"] = DAGSHUB_TOKEN
          
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient()
          
          models_to_check = ["fact-checker-gan"]
          all_pass = True
          
          for model_name in models_to_check:
              print(f"\n{'='*60}")
              print(f"📦 Checking: {model_name}")
              print('='*60)
              
              # Get latest versions from None stage (newly trained)
              try:
                  all_versions = client.search_model_versions(f"name='{model_name}'")
                  latest_versions = [v for v in all_versions if v.current_stage == "None"]
                  
                  if not latest_versions:
                      print(f"ℹ️  No new versions found (this is OK - no new training)")
                      continue
                  
                  # Sort by version number and get latest
                  latest_versions.sort(key=lambda x: int(x.version), reverse=True)
                  version = latest_versions[0]
                  
                  run = client.get_run(version.run_id)
                  metrics = run.data.metrics
                  
                  acc = metrics.get('test_accuracy', metrics.get('accuracy'))
                  f1 = metrics.get('test_f1', metrics.get('f1_score', metrics.get('f1')))
                  
                  print(f"\n📊 Latest Version: v{version.version}")
                  print(f"   Run ID: {version.run_id}")
                  print(f"\n   Metrics:")
                  
                  if acc:
                      status = "✅" if acc >= 0.75 else "❌"
                      print(f"   {status} Accuracy: {acc:.4f} (threshold: ≥0.75)")
                      if acc < 0.75:
                          all_pass = False
                  else:
                      print(f"   ⚠️  Accuracy metric not found")
                      all_pass = False
                  
                  if f1:
                      status = "✅" if f1 >= 0.70 else "❌"
                      print(f"   {status} F1 Score: {f1:.4f} (threshold: ≥0.70)")
                      if f1 < 0.70:
                          all_pass = False
                  else:
                      print(f"   ⚠️  F1 Score metric not found")
                      all_pass = False
                  
                  if acc and f1 and acc >= 0.75 and f1 >= 0.70:
                      print(f"\n✅ {model_name} passes quality gates!")
                  else:
                      print(f"\n❌ {model_name} does NOT meet quality gates")
                      all_pass = False
                      
              except Exception as e:
                  print(f"⚠️  Error checking {model_name}: {e}")
          
          print(f"\n{'='*60}")
          if all_pass:
              print("✅ All models pass quality gates (or no new models to check)")
              print("✅ Ready for promotion to Staging on merge")
          else:
              print("❌ Some models failed quality gates")
              print("⚠️  Fix models before merging to staging")
              exit(1)
          print('='*60)
          EOF
          
          python check_quality_gates.py

      # ==== PUSH ONLY: Deploy to Fly.io ====
      - name: Deploy to Fly.io Staging
        if: github.event_name == 'push'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: github.event_name == 'push'
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ==== PUSH ONLY: Smoke Tests ====
      - name: Smoke tests
        if: github.event_name == 'push'
        run: |
          echo "⏳ Waiting for deployment..."
          sleep 15
          
          echo "🧪 Running smoke tests..."
          curl -f https://verigraph-api-staging.fly.dev/health || exit 1
          echo "✓ Health check passed"
          
          curl -f https://verigraph-api-staging.fly.dev/ || exit 1
          echo "✓ Root endpoint passed"
          
          echo "✅ All smoke tests passed!"
      
      # ==== PUSH ONLY: Model Quality Gate + Promotion to Staging ====
      - name: Promote Models to Staging
        if: github.event_name == 'push'
        env:
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "🚀 Promoting models to Staging with quality gates..."
          pip install mlflow dagshub
          
          cat > promote_to_staging.py << 'EOF'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient
          
          DAGSHUB_REPO = os.getenv("DAGSHUB_REPO")
          DAGSHUB_USER = os.getenv("DAGSHUB_USER")
          DAGSHUB_TOKEN = os.getenv("DAGSHUB_TOKEN")
          
          # Setup MLflow with token auth
          tracking_uri = f"https://dagshub.com/{DAGSHUB_REPO}.mlflow"
          os.environ["MLFLOW_TRACKING_URI"] = tracking_uri
          os.environ["MLFLOW_TRACKING_USERNAME"] = DAGSHUB_USER
          os.environ["MLFLOW_TRACKING_PASSWORD"] = DAGSHUB_TOKEN
          os.environ["DAGSHUB_USER_TOKEN"] = DAGSHUB_TOKEN
          
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient()
          
          models_to_promote = ["fact-checker-gan"]
          promotion_successful = True
          
          for model_name in models_to_promote:
              print(f"\n{'='*60}")
              print(f"📦 Processing: {model_name}")
              print('='*60)
              
              try:
                  # Get latest version from None stage (newly trained)
                  all_versions = client.search_model_versions(f"name='{model_name}'")
                  none_versions = [v for v in all_versions if v.current_stage == "None"]
                  
                  if not none_versions:
                      print(f"ℹ️  No new versions to promote (keeping existing Staging)")
                      continue
                  
                  # Sort by version number and get latest
                  none_versions.sort(key=lambda x: int(x.version), reverse=True)
                  latest = none_versions[0]
                  
                  run = client.get_run(latest.run_id)
                  metrics = run.data.metrics
                  
                  acc = metrics.get('test_accuracy', metrics.get('accuracy'))
                  f1 = metrics.get('test_f1', metrics.get('f1_score', metrics.get('f1')))
                  
                  print(f"\n📊 Candidate Version: v{latest.version}")
                  print(f"   Run ID: {latest.run_id}")
                  print(f"\n   Metrics:")
                  
                  passes_gates = True
                  
                  if acc:
                      status = "✅" if acc >= 0.75 else "❌"
                      print(f"   {status} Accuracy: {acc:.4f} (threshold: ≥0.75)")
                      if acc < 0.75:
                          passes_gates = False
                  else:
                      print(f"   ❌ Accuracy metric not found")
                      passes_gates = False
                  
                  if f1:
                      status = "✅" if f1 >= 0.70 else "❌"
                      print(f"   {status} F1 Score: {f1:.4f} (threshold: ≥0.70)")
                      if f1 < 0.70:
                          passes_gates = False
                  else:
                      print(f"   ❌ F1 Score metric not found")
                      passes_gates = False
                  
                  if passes_gates:
                      print(f"\n✅ Quality gates passed! Promoting to Staging...")
                      
                      # Archive old staging versions
                      old_staging = client.get_latest_versions(model_name, stages=["Staging"])
                      for old_ver in old_staging:
                          client.transition_model_version_stage(
                              name=model_name,
                              version=old_ver.version,
                              stage="Archived",
                              archive_existing_versions=False
                          )
                          print(f"   📦 Archived old version: v{old_ver.version}")
                      
                      # Promote new version to staging
                      client.transition_model_version_stage(
                          name=model_name,
                          version=latest.version,
                          stage="Staging",
                          archive_existing_versions=False
                      )
                      
                      print(f"   🎉 Successfully promoted v{latest.version} to Staging!")
                  else:
                      print(f"\n❌ Quality gates failed! NOT promoting to Staging")
                      print(f"   Keeping existing Staging version")
                      promotion_successful = False
                      
              except Exception as e:
                  print(f"❌ Error promoting {model_name}: {e}")
                  promotion_successful = False
          
          print(f"\n{'='*60}")
          if promotion_successful:
              print("✅ All model promotions completed successfully!")
          else:
              print("⚠️  Some models failed promotion (check logs above)")
              print("    Existing Staging models remain unchanged")
          print('='*60)
          EOF
          
          python promote_to_staging.py

      # Deployment summary
      - name: Create deployment summary
        if: github.event_name == 'push' && success()
        run: |
          echo "### 🚀 Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Backend" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://verigraph-api-staging.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed & Tested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Models" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Promoted to Staging (with quality gates)" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** fact-checker-gan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:** Merge to main for Production deployment" >> $GITHUB_STEP_SUMMARY

  # ================================
  # FRONTEND: Build + Test
  # ================================
  frontend:
    name: Frontend Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js with caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install and build inline
      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build
        run: ls -lh dist/

      # Test summary
      - name: Create build summary
        if: success()
        run: |
          echo "### ✅ Frontend Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Build successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts:** Ready for deployment" >> $GITHUB_STEP_SUMMARY

          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "✅ Frontend build successful"
