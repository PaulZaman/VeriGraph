name: Deploy to Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-staging.yml'

jobs:
  deploy:
    name: Deploy to Fly.io Staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io Staging
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for deployment
        run: sleep 15

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          
          # Health check
          curl -f https://verigraph-api-staging.fly.dev/health || exit 1
          echo "✓ Health check passed"
          
          # API root endpoint
          curl -f https://verigraph-api-staging.fly.dev/ || exit 1
          echo "✓ Root endpoint passed"
          
          # Verify endpoint (POST)
          RESPONSE=$(curl -X POST https://verigraph-api-staging.fly.dev/verify \
            -H "Content-Type: application/json" \
            -d '{"claim":"Test claim"}' \
            -w "%{http_code}" -o /dev/null -s)
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✓ Verify endpoint passed"
          else
            echo "✗ Verify endpoint failed with status $RESPONSE"
            exit 1
          fi
          
          echo "All smoke tests passed!"

      - name: Create deployment summary
        if: success()
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** verigraph-api-staging" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://verigraph-api-staging.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed & Tested" >> $GITHUB_STEP_SUMMARY
