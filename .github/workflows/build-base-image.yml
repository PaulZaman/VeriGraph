name: Build and Push Base Image

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main
      - dev
    paths:
      - 'backend/requirements.txt'
      - 'backend/Dockerfile.base'
      - '.github/workflows/build-base-image.yml'

jobs:
  build-base-image:
    name: Build ML Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/paulzaman/verigraph/verigraph-base
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/paulzaman/verigraph/verigraph-base:latest
            type=gha
          cache-to: type=gha,mode=max

      - name: Create summary
        run: |
          echo "### 🐳 Base Image Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ github.repository }}/verigraph-base:latest" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This image contains all ML dependencies and can now be used as a base for fast deployments." >> $GITHUB_STEP_SUMMARY
