name: CI/CD - Production

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-production.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-production.yml'

jobs:
  # ================================
  # BACKEND: Test + Build + Deploy
  # ================================
  backend:
    name: Backend Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python with caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run tests inline
      - name: Run tests
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: python -m pytest test_main.py -v --tb=short

      # Promote GAN model from Staging to Production with quality gates (only on push)
      - name: Promote GAN Model to Production (with Quality Gates)
        if: github.event_name == 'push'
        env:
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: "fact-checker-gan"
          MIN_ACCURACY: "0.75"
          MIN_F1_SCORE: "0.70"
        run: |
          echo "🔍 Installing MLflow dependencies..."
          pip install mlflow dagshub
          echo ""
          echo "🚀 Starting GAN model promotion with quality gates..."
          python scripts/promote_with_quality_gate.py

      # Build and test Docker image inline
      - name: Build Docker image
        run: docker build -t verigraph-api:production .

      - name: Test Docker image
        if: github.event_name == 'push'
        run: |
          docker run -d --name test-api -p 8080:8080 -e TEST_MODE=true verigraph-api:production
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop test-api
          docker rm test-api

      # Deploy to Fly.io (only on push)
      - name: Deploy to Fly.io Production
        if: github.event_name == 'push'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: github.event_name == 'push'
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Smoke tests after deployment
      - name: Smoke tests
        if: github.event_name == 'push'
        run: |
          echo "Waiting for deployment..."
          sleep 15
          
          echo "Running smoke tests..."
          curl -f https://verigraph-api.fly.dev/health || exit 1
          echo "✓ Health check passed"
          
          curl -f https://verigraph-api.fly.dev/ || exit 1
          echo "✓ Root endpoint passed"
          
          echo "✅ All smoke tests passed!"

      # Deployment summary
      - name: Create deployment summary
        if: github.event_name == 'push' && success()
        run: |
          echo "### 🚀 Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://verigraph-api.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed & Tested" >> $GITHUB_STEP_SUMMARY

  # ================================
  # FRONTEND: Build + Test
  # ================================
  frontend:
    name: Frontend Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js with caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install and build inline
      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build
        run: ls -lh dist/

      # Test summary
      - name: Create build summary
        if: success()
        run: |
          echo "### ✅ Frontend Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Build successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts:** Ready for deployment" >> $GITHUB_STEP_SUMMARY
