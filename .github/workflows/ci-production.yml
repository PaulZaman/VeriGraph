name: Production

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-production.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-production.yml'

jobs:
  # ================================
  # PR TO MAIN: COMPREHENSIVE VALIDATION
  # All tests from dev and staging - final checkpoint
  # ================================
  
  backend-unit-tests:
    name: Backend Unit Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🧪 Running unit tests..."
          python -m pytest test_main.py -v --tb=short -m "not integration"

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Backend Unit Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API Endpoint Tests" >> $GITHUB_STEP_SUMMARY

  backend-integration-tests:
    name: Backend Integration Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🔗 Running integration tests..."
          python -m pytest test_main.py -v --tb=short -k "test_verify"

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Backend Integration Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Database Integration Tests" >> $GITHUB_STEP_SUMMARY

  backend-coverage:
    name: Backend Test Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite with coverage
        env:
          TEST_MODE: "true"
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "🎯 Running complete test suite with coverage..."
          python -m pytest test_main.py -v --tb=short --cov=. --cov-report=term-missing

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Test Coverage Report Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Full test suite passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code coverage measured" >> $GITHUB_STEP_SUMMARY

  docker-build:
    name: Docker Build Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t verigraph-api:production .

      - name: Test Docker container
        run: |
          echo "🐳 Testing Docker container..."
          docker run -d --name test-api -p 8080:8080 -e TEST_MODE=true verigraph-api:production
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          echo "✓ Health check passed"
          curl -f http://localhost:8080/ || exit 1
          echo "✓ Root endpoint passed"
          docker stop test-api
          docker rm test-api

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Docker Build Test Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker image builds successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container health checks passed" >> $GITHUB_STEP_SUMMARY

  frontend:
    name: Frontend Tests & Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build production bundle
        run: npm run build
        env:
          # Ensure build doesn't fail on warnings
          CI: false

      - name: Check build output
        run: |
          echo "✅ Checking build artifacts..."
          if [ -d "dist" ]; then
            echo "✓ dist/ directory created"
            echo "✓ Build output size: $(du -sh dist | cut -f1)"
            ls -lh dist/
          else
            echo "❌ dist/ directory not found"
            exit 1
          fi

      - name: Test summary
        if: success()
        run: |
          echo "### ✅ Frontend Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies Installed (npm ci)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Production Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build Artifacts Validated" >> $GITHUB_STEP_SUMMARY

  # ================================
  # PUSH TO MAIN: DEPLOYMENT ONLY
  # Tests already validated in PR
  # ================================

  promote-model:
    name: Promote Model to Production
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Promote Staging model to Production
        env:
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "🚀 Promoting Staging model to Production..."
          pip install mlflow dagshub
          
          cat > promote_staging_to_production.py << 'EOF'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient
          
          DAGSHUB_REPO = os.getenv("DAGSHUB_REPO")
          DAGSHUB_USER = os.getenv("DAGSHUB_USER")
          DAGSHUB_TOKEN = os.getenv("DAGSHUB_TOKEN")
          
          tracking_uri = f"https://dagshub.com/{DAGSHUB_REPO}.mlflow"
          os.environ["MLFLOW_TRACKING_URI"] = tracking_uri
          os.environ["MLFLOW_TRACKING_USERNAME"] = DAGSHUB_USER
          os.environ["MLFLOW_TRACKING_PASSWORD"] = DAGSHUB_TOKEN
          os.environ["DAGSHUB_USER_TOKEN"] = DAGSHUB_TOKEN
          
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient()
          
          model_name = "fact-checker-gan"
          
          print(f"\n{'='*60}")
          print(f"📦 Promoting {model_name} to Production")
          print('='*60)
          
          # Get current Staging model
          staging_versions = client.get_latest_versions(model_name, stages=["Staging"])
          
          if not staging_versions:
              print(f"❌ No Staging model found for {model_name}")
              print(f"   Cannot promote to Production without a Staging model")
              exit(1)
          
          staging_model = staging_versions[0]
          
          print(f"\n📊 Staging Model:")
          print(f"   Version: v{staging_model.version}")
          print(f"   Run ID: {staging_model.run_id}")
          
          # Get metrics from the staging model
          run = client.get_run(staging_model.run_id)
          metrics = run.data.metrics
          
          acc = metrics.get('test_accuracy', metrics.get('accuracy'))
          f1 = metrics.get('test_f1', metrics.get('f1_score', metrics.get('f1')))
          
          print(f"\n   Metrics:")
          if acc:
              print(f"   • Accuracy: {acc:.4f}")
          if f1:
              print(f"   • F1 Score: {f1:.4f}")
          
          # Archive old Production models
          production_versions = client.get_latest_versions(model_name, stages=["Production"])
          
          if production_versions:
              print(f"\n📦 Archiving old Production models:")
              for old_ver in production_versions:
                  client.transition_model_version_stage(
                      name=model_name,
                      version=old_ver.version,
                      stage="Archived",
                      archive_existing_versions=False
                  )
                  print(f"   ✓ Archived v{old_ver.version}")
          
          # Promote Staging to Production
          client.transition_model_version_stage(
              name=model_name,
              version=staging_model.version,
              stage="Production",
              archive_existing_versions=False
          )
          
          print(f"\n✅ Successfully promoted v{staging_model.version} to Production!")
          print('='*60)
          EOF
          
          python promote_staging_to_production.py

      - name: Promotion summary
        if: success()
        run: |
          echo "### ✅ Model Promoted to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** fact-checker-gan" >> $GITHUB_STEP_SUMMARY
          echo "- **Source:** Staging → Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Promoted & Archived old versions" >> $GITHUB_STEP_SUMMARY

  deploy-backend:
    name: Deploy Backend to Production
    if: github.event_name == 'push'
    needs: promote-model
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t verigraph-api:production .

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke tests
        run: |
          echo "⏳ Waiting for deployment..."
          sleep 15
          
          echo "🧪 Running smoke tests..."
          curl -f https://verigraph-api.fly.dev/health || exit 1
          echo "✓ Health check passed"
          
          curl -f https://verigraph-api.fly.dev/ || exit 1
          echo "✓ Root endpoint passed"
          
          echo "✅ All smoke tests passed!"

      - name: Deployment summary
        if: success()
        run: |
          echo "### 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://verigraph-api.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed & Tested" >> $GITHUB_STEP_SUMMARY
