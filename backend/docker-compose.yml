version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verigraph-backend
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - ENVIRONMENT=development
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    restart: unless-stopped
